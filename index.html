<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseñados a su Imagen | Iglesia Cristiana</title>
    <link rel="stylesheet" href="estilos.css">
    <!-- Iconos para las redes sociales -->
   <section id="redes" class="redes-seccion">
    <h2>REDES SOCIALES</h2>
    <div class="redes-grid">
        
        <a href="TU_LINK_YOUTUBE" target="_blank" class="red-card">
            <img src="foto-yt.jpg" alt="YouTube" class="fondo-red">
            <div class="overlay">
                <i class="fab fa-youtube"></i>
            </div>
        </a>

        <a href="https://facebook.com" target="_blank" class="red-card">
            <img src="foto-fb.jpg" alt="Facebook" class="fondo-red">
            <div class="overlay">
                <i class="fab fa-facebook-f"></i>
            </div>
        </a>

        <a href="TU_LINK_INSTAGRAM" target="_blank" class="red-card">
            <img src="foto-ig.jpg" alt="Instagram" class="fondo-red">
            <div class="overlay">
                <i class="fab fa-instagram"></i>
            </div>
        </a>

        <a href="TU_LINK_TIKTOK" target="_blank" class="red-card">
            <img src="foto-tk.jpg" alt="TikTok" class="fondo-red">
            <div class="overlay">
                <i class="fab fa-tiktok"></i>
            </div>
        </a>

    </div>
</section>

    <!-- SECCIÓN DE UBICACIÓN (MAPA) -->
    <section id="ubicacion" class="mapa-section">
        <h2>NUESTRA UBICACIÓN</h2>
        <div class="mapa-contenedor">
            <!-- Este es tu mapa de Google Maps -->
            <iframe src="https://google.com" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <p><a href="https://maps.app.goo.gl/7TJf2qXGbZRw9NSs9" target="_blank" style="color: #d4af37; text-decoration: none; font-weight: bold;">Abrir en Google Maps</a></p>
    </section>

    <!-- SECCIÓN EN VIVO -->
    <section id="en-vivo" class="envivo-section">
        <h2>TRANSMISIÓN EN VIVO</h2>
        <div class="video-contenedor">
            <iframe width="100%" height="500" src="https://youtube.com" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <footer id="contacto">
        <h3>SÍGUENOS EN NUESTRAS REDES</h3>
        <div class="social-footer">
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
        <p>© 2024 Iglesia Cristiana Diseñados a su Imagen</p>
    </footer>

</body>
</html>
